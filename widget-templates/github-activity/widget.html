<div class="container">
  <div class="header">
    <div class="avatar-wrap">
      <img class="avatar" id="avatar" src="" alt="" />
      <div class="avatar-fallback" id="avatar-fallback">GH</div>
    </div>
    <div class="user-info">
      <div class="username" id="username">github</div>
      <div class="streak" id="streak">
        <span id="streak-count">--</span> day streak
      </div>
    </div>
    <div class="stats-right">
      <div class="stat-item">
        <div class="stat-num" id="repos">--</div>
        <div class="stat-lbl">repos</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="followers">--</div>
        <div class="stat-lbl">followers</div>
      </div>
    </div>
  </div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
</div>
