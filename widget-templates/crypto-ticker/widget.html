        <div class="coin-symbol">BTC</div>

        <div class="coin-price" id="price-BTC">--</div>

        <div class="coin-change" id="change-ETH">--</div>
      </div>
    </div>
    <div class="coin sol" id="coin-SOL">
      <div class="coin-left">
